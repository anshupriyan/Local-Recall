<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Recall Explorer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #333333;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.5;
        }

        h1 {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 1px solid #dddddd;
            padding-bottom: 10px;
        }

        .search-form {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .search-input {
            flex: 1;
            padding: 10px 14px;
            font-size: 15px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            outline: none;
        }

        .search-input:focus {
            border-color: #0066cc;
        }

        .search-btn {
            background-color: #0066cc;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            padding: 0 20px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
        }

        .search-btn:hover {
            background-color: #0052a3;
        }

        .search-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        #loadingArea {
            display: none;
            color: #666666;
            font-style: italic;
            margin-bottom: 20px;
        }

        .error-banner {
            display: none;
            background-color: #fce8e6;
            border: 1px solid #f2b8b5;
            color: #b3261e;
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .result-container {
            display: none;
        }

        .answer-section {
            background-color: #f9f9f9;
            border: 1px solid #e3e3e3;
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .answer-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #111111;
        }

        .answer-body {
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .sources-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #111111;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .source-card {
            border: 1px solid #e3e3e3;
            border-radius: 4px;
            overflow: hidden;
            background-color: #ffffff;
            font-size: 13px;
            display: flex;
            flex-direction: column;
        }

        .thumbnail-container {
            width: 100%;
            height: 130px;
            background-color: #eeeeee;
            position: relative;
            overflow: hidden;
        }

        .thumbnail-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .ref-badge {
            position: absolute;
            top: 6px;
            left: 6px;
            background-color: rgba(0, 0, 0, 0.7);
            color: #ffffff;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
        }

        .source-info {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }

        .app-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .app-name {
            font-weight: bold;
            color: #555555;
        }

        .distance {
            color: #777777;
            font-size: 11px;
        }

        .window-title {
            color: #111111;
            font-weight: 500;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 2.8em;
            margin-bottom: 4px;
        }

        .timestamp {
            color: #777777;
            font-size: 11px;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <h1>Local Recall</h1>
    
    <form id="askForm" class="search-form" onsubmit="handleAsk(event)">
        <input 
            type="text" 
            id="queryInput" 
            class="search-input" 
            placeholder="Ask a question about your history..." 
            required
            autocomplete="off"
        >
        <button type="submit" id="submitBtn" class="search-btn">Ask</button>
    </form>

    <!-- Loading Indicator -->
    <div id="loadingArea">Searching screen history...</div>

    <!-- Error Banner -->
    <div id="errorBanner" class="error-banner"></div>

    <!-- Results -->
    <div id="resultArea" class="result-container">
        <div class="answer-section">
            <div class="answer-title">Answer</div>
            <div id="answerBody" class="answer-body"></div>
        </div>

        <div>
            <div class="sources-title">Sources</div>
            <div id="sourcesGrid" class="grid"></div>
        </div>
    </div>

    <script>
        async function handleAsk(event) {
            event.preventDefault();
            
            const queryInput = document.getElementById('queryInput');
            const submitBtn = document.getElementById('submitBtn');
            const loadingArea = document.getElementById('loadingArea');
            const resultArea = document.getElementById('resultArea');
            const errorBanner = document.getElementById('errorBanner');
            
            const query = queryInput.value.trim();
            if (!query) return;

            submitBtn.disabled = true;
            loadingArea.style.display = 'block';
            resultArea.style.display = 'none';
            errorBanner.style.display = 'none';
            
            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: query })
                });

                if (!response.ok) {
                    throw new Error(`Server status: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.error) {
                    showError("Warning", data.error);
                }
                
                renderResults(data);
                
            } catch (err) {
                showError("Error", `Request failed: ${err.message}`);
            } finally {
                submitBtn.disabled = false;
                loadingArea.style.display = 'none';
            }
        }

        function showError(title, message) {
            const errorBanner = document.getElementById('errorBanner');
            errorBanner.innerHTML = `<strong>${title}:</strong> ${message.replace(/\n/g, '<br>')}`;
            errorBanner.style.display = 'block';
        }

        function renderResults(data) {
            const resultArea = document.getElementById('resultArea');
            const answerBody = document.getElementById('answerBody');
            const sourcesGrid = document.getElementById('sourcesGrid');

            answerBody.textContent = data.answer || "No answer returned.";

            sourcesGrid.innerHTML = '';
            if (data.sources && data.sources.length > 0) {
                data.sources.forEach((src, idx) => {
                    const card = document.createElement('div');
                    card.className = 'source-card';
                    
                    const app = src.app_name || 'System';
                    const title = src.window_title || 'None';
                    const timestamp = formatDate(src.timestamp);
                    const distance = src.distance !== undefined ? src.distance.toFixed(4) : 'N/A';
                    
                    card.innerHTML = `
                        <div class="thumbnail-container">
                            <img class="thumbnail-img" src="/snapshot/${src.id}" alt="Screenshot">
                            <div class="ref-badge">Ref ${idx + 1}</div>
                        </div>
                        <div class="source-info">
                            <div class="app-row">
                                <span class="app-name">${app}</span>
                                <span class="distance">L2: ${distance}</span>
                            </div>
                            <div class="window-title" title="${title}">${title}</div>
                            <div class="timestamp">${timestamp}</div>
                        </div>
                    `;
                    sourcesGrid.appendChild(card);
                });
            } else {
                sourcesGrid.innerHTML = '<p>No sources found.</p>';
            }

            resultArea.style.display = 'block';
        }

        function formatDate(isoString) {
            try {
                const date = new Date(isoString);
                return date.toLocaleString();
            } catch (e) {
                return isoString;
            }
        }

        window.onload = () => {
            document.getElementById('queryInput').focus();
        };
    </script>
</body>
</html>
